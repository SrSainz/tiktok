<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clip Studio ES Web</title>
    <style>
      :root {
        --bg: #081225;
        --bg-2: #101d36;
        --card: #111f3c;
        --card-2: #0d1930;
        --line: #284067;
        --text: #e8efff;
        --muted: #9cb0d6;
        --accent: #44b0ff;
        --accent-2: #4df9b8;
        --danger: #ff7272;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 20% 0%, #1f3261 0%, var(--bg) 38%, #050b18 100%);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .container {
        max-width: 1220px;
        margin: 0 auto;
        padding: 26px 16px 40px;
      }
      .hero {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px;
        background: linear-gradient(140deg, rgba(24, 41, 76, 0.92), rgba(8, 17, 34, 0.92));
        margin-bottom: 14px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 38px;
        letter-spacing: 0.3px;
      }
      .muted {
        color: var(--muted);
      }
      .grid {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 14px;
      }
      .panel {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
        padding: 14px;
      }
      .panel h2 {
        margin: 0 0 10px;
        font-size: 19px;
      }
      label {
        display: block;
        margin: 10px 0 6px;
        color: #cad7f3;
        font-size: 13px;
      }
      input,
      select,
      button,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #081429;
        color: var(--text);
        padding: 10px;
        font-size: 14px;
      }
      input::placeholder {
        color: #7f95c1;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .inline {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 8px;
      }
      .inline input {
        width: auto;
      }
      .btn {
        cursor: pointer;
        background: linear-gradient(90deg, var(--accent), #5295ff);
        border: 0;
        font-weight: 600;
      }
      .btn.secondary {
        background: linear-gradient(90deg, #304d7f, #4368a7);
      }
      .btn.green {
        background: linear-gradient(90deg, #2f9f89, var(--accent-2));
        color: #071521;
      }
      .status {
        margin-top: 10px;
        padding: 8px 10px;
        border: 1px solid #365683;
        border-radius: 10px;
        background: #08162d;
        font-size: 13px;
      }
      .status.error {
        border-color: #8a3a3a;
        color: #ffb3b3;
        background: #2a1218;
      }
      .list {
        margin-top: 12px;
        max-height: 310px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 12px;
      }
      .item {
        padding: 10px;
        border-bottom: 1px solid #1f3252;
        cursor: pointer;
      }
      .item:hover {
        background: #0e1f3c;
      }
      .item.active {
        background: #163464;
      }
      .item .title {
        font-size: 14px;
        font-weight: 600;
      }
      .item .meta {
        color: var(--muted);
        font-size: 12px;
        margin-top: 3px;
      }
      .logs {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #060f21;
        height: 170px;
        overflow: auto;
        padding: 8px;
        font-family: Consolas, monospace;
        font-size: 12px;
        white-space: pre-wrap;
      }
      .results {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
      }
      .clip {
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        background: #0a1630;
      }
      .clip video {
        width: 100%;
        display: block;
        background: black;
      }
      .clip .body {
        padding: 10px;
      }
      .pill {
        display: inline-block;
        font-size: 11px;
        padding: 3px 7px;
        border-radius: 999px;
        background: #112a50;
        margin-right: 5px;
        margin-bottom: 6px;
      }
      .signal-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
      }
      .signal {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid #26466f;
        background: #0c203e;
        color: #dceaff;
        font-size: 11px;
      }
      .clip .desc {
        font-size: 13px;
        color: #d3e0fb;
        min-height: 34px;
        margin-bottom: 6px;
      }
      .clip .why {
        font-size: 12px;
        color: #98afd8;
        margin-top: 5px;
      }
      .clip .transcript {
        margin-top: 10px;
        padding: 10px;
        border-radius: 10px;
        background: #071223;
        border: 1px solid #213b61;
        color: #edf3ff;
        font-size: 12px;
        line-height: 1.45;
      }
      .clip .metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }
      .clip .metric {
        font-size: 11px;
        color: #b7c8e8;
        border: 1px solid #213b61;
        background: #0a1830;
        border-radius: 8px;
        padding: 4px 7px;
      }
      .clip .links {
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }
      .clip a {
        flex: 1;
        color: #07243e;
        text-decoration: none;
        text-align: center;
        background: #77c3ff;
        padding: 7px 8px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
      }
      .clip .links button {
        flex: 1;
        width: auto;
        color: #07243e;
        background: #90e7c6;
        padding: 7px 8px;
        border-radius: 8px;
        border: 0;
        font-size: 12px;
        font-weight: 600;
      }
      .clip .links button:disabled {
        opacity: 0.65;
        cursor: wait;
      }
      .clip a.secondary {
        background: #90e7c6;
      }
      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <h1>Clip Studio ES Web</h1>
        <div class="muted">Estilo Opus: descubre virales, genera opciones de clips y elige cuál subir.</div>
      </section>

      <section class="grid">
        <aside class="panel">
          <h2>Configuración</h2>
          <label for="backendUrl">Backend URL</label>
          <input id="backendUrl" placeholder="https://tu-backend.com o deja vacio si usas /studio en el mismo servidor" />
          <div class="row">
            <button class="btn secondary" id="saveBackendBtn">Guardar URL</button>
            <button class="btn secondary" id="healthBtn">Probar conexión</button>
          </div>
          <div id="healthStatus" class="status">Sin comprobar</div>

          <h2 style="margin-top: 14px">Descubrir virales</h2>
          <div class="row">
            <div>
              <label for="scanInput">Scan/canal</label>
              <input id="scanInput" type="number" min="5" max="50" value="12" />
            </div>
            <div>
              <label for="limitInput">Límite</label>
              <input id="limitInput" type="number" min="1" max="50" value="12" />
            </div>
          </div>
          <div class="inline">
            <input id="weekOnly" type="checkbox" checked />
            <span class="muted">Solo videos de esta semana</span>
          </div>
          <button class="btn" id="discoverBtn" style="margin-top: 10px">Buscar virales</button>
          <div id="discoverStatus" class="status">Pulsa para cargar candidatos.</div>
          <div id="candidateList" class="list"></div>
        </aside>

        <section class="panel">
          <h2>Generar opciones</h2>
          <label for="urlInput">URL de YouTube</label>
          <input id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
          <div class="row">
            <div>
              <label for="durationInput">Duración clip (s)</label>
              <input id="durationInput" type="number" min="20" max="90" value="60" />
            </div>
            <div>
              <label for="optionsInput">Número de opciones</label>
              <input id="optionsInput" type="number" min="2" max="12" value="6" />
            </div>
          </div>
          <div class="row">
            <div>
              <label for="strideInput">Stride (s)</label>
              <input id="strideInput" type="number" min="5" max="30" value="10" />
            </div>
            <div>
              <label for="overlapInput">Overlap (0.10-0.80)</label>
              <input id="overlapInput" type="number" min="0.1" max="0.8" step="0.05" value="0.40" />
            </div>
          </div>
          <button class="btn green" id="generateBtn" style="margin-top: 10px">Generar clips</button>
          <div id="jobStatus" class="status">Sin job activo.</div>
          <div id="jobLogs" class="logs"></div>

          <h2 style="margin-top: 14px">Opciones generadas</h2>
          <div id="resultMeta" class="muted" style="margin-bottom: 8px">Aún no hay resultados.</div>
          <div id="results" class="results"></div>
        </section>
      </section>
    </main>

    <script>
      const state = {
        backend: "",
        jobId: "",
        lastResult: null,
        logCursor: 0,
        pollTimer: null,
        pollFailures: 0,
        pollInFlight: false,
        pollFailureLimit: 600,
        candidates: [],
        selectedCandidateIdx: -1
      };

      const $ = (id) => document.getElementById(id);

      const ui = {
        backendUrl: $("backendUrl"),
        healthStatus: $("healthStatus"),
        discoverStatus: $("discoverStatus"),
        candidateList: $("candidateList"),
        urlInput: $("urlInput"),
        jobStatus: $("jobStatus"),
        jobLogs: $("jobLogs"),
        resultMeta: $("resultMeta"),
        results: $("results")
      };

      function setStatus(el, text, isError = false) {
        el.textContent = text;
        el.classList.toggle("error", Boolean(isError));
      }

      function normalizeBackend(url) {
        return (url || "").trim().replace(/\/+$/, "");
      }

      function inferBackendFromLocation() {
        if (typeof window === "undefined" || !window.location || !/^https?:$/i.test(window.location.protocol)) {
          return "";
        }
        const path = String(window.location.pathname || "");
        const basePath = path.replace(/\/studio\/?$/i, "").replace(/\/+$/, "");
        return `${window.location.origin}${basePath}`;
      }

      function chooseInitialBackend() {
        const saved = normalizeBackend(localStorage.getItem("clip_backend_url") || "");
        const inferred = normalizeBackend(inferBackendFromLocation());
        if (!inferred) {
          return saved;
        }
        try {
          const host = new URL(inferred).hostname.toLowerCase();
          if (host.endsWith(".vercel.app")) {
            if (!saved) {
              return inferred;
            }
            const savedHost = new URL(saved).hostname.toLowerCase();
            if (savedHost.includes("railway.app")) {
              return inferred;
            }
          }
        } catch (_) {
          return saved || inferred;
        }
        return saved || inferred;
      }

      function resolveAssetUrl(url) {
        const raw = String(url || "").trim();
        if (!raw) {
          return "";
        }
        if (/^https?:\/\//i.test(raw)) {
          return raw;
        }
        if (/^[a-z0-9.-]+\.[a-z]{2,}(\/.*)?$/i.test(raw)) {
          return `https://${raw}`;
        }
        if (!state.backend) {
          return raw;
        }
        try {
          return new URL(raw, `${state.backend}/`).toString();
        } catch (_) {
          return raw;
        }
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function readNumberInput(id, fallback) {
        const raw = String($(id).value ?? "").trim();
        if (!raw) {
          return fallback;
        }
        const normalized = raw.replace(",", ".");
        const value = Number(normalized);
        return Number.isFinite(value) ? value : fallback;
      }

      function saveBackendUrl() {
        state.backend = normalizeBackend(ui.backendUrl.value);
        localStorage.setItem("clip_backend_url", state.backend);
        setStatus(ui.healthStatus, state.backend ? `Backend guardado: ${state.backend}` : "Backend vacio", !state.backend);
      }

      async function api(path, payload, timeoutMs = 20000) {
        if (!state.backend) {
          throw new Error("Configura primero la URL del backend.");
        }
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        const res = await fetch(`${state.backend}${path}`, {
          method: payload ? "POST" : "GET",
          headers: payload ? { "Content-Type": "application/json" } : undefined,
          body: payload ? JSON.stringify(payload) : undefined,
          signal: controller.signal
        }).finally(() => clearTimeout(timeout));
        const rawText = await res.text();
        let data = {};
        try {
          data = rawText ? JSON.parse(rawText) : {};
        } catch (_) {
          data = {};
        }
        if (!res.ok) {
          const missing = Array.isArray(data.missing) && data.missing.length ? ` (${data.missing.join(", ")})` : "";
          const message = data.detail || data.error;
          throw new Error(message ? `${message}${missing}` : `HTTP ${res.status}`);
        }
        return data;
      }

      function renderCandidates() {
        ui.candidateList.innerHTML = "";
        state.candidates.forEach((item, idx) => {
          const row = document.createElement("div");
          row.className = `item ${idx === state.selectedCandidateIdx ? "active" : ""}`;
          const views = Number(item.view_count || 0).toLocaleString("es-ES");
          const vpd = Number(item.views_per_day || 0).toLocaleString("es-ES", { maximumFractionDigits: 0 });
          row.innerHTML = `
            <div class="title">${idx + 1}. ${item.title}</div>
            <div class="meta">AI ${Number(item.ai_score || 0).toFixed(1)} | ${item.channel || "Canal"} | ${views} views | ${vpd}/dia</div>
          `;
          row.onclick = () => {
            state.selectedCandidateIdx = idx;
            ui.urlInput.value = item.url;
            renderCandidates();
          };
          ui.candidateList.appendChild(row);
        });
      }

      async function discover() {
        try {
          setStatus(ui.discoverStatus, "Buscando videos...", false);
          const payload = {
            per_channel_scan: readNumberInput("scanInput", 12),
            max_results: readNumberInput("limitInput", 12),
            this_week_only: Boolean($("weekOnly").checked)
          };
          const data = await api("/api/discover", payload, 120000);
          state.candidates = data.items || [];
          state.selectedCandidateIdx = state.candidates.length ? 0 : -1;
          if (state.candidates.length) {
            ui.urlInput.value = state.candidates[0].url;
          }
          renderCandidates();
          setStatus(ui.discoverStatus, `Encontrados ${state.candidates.length} candidatos.`, false);
        } catch (err) {
          setStatus(ui.discoverStatus, `Error discovery: ${err.message}`, true);
        }
      }

      function clearPolling() {
        if (state.pollTimer) {
          clearInterval(state.pollTimer);
          state.pollTimer = null;
        }
        state.pollFailures = 0;
      }

      function appendLogs(lines) {
        if (!lines || !lines.length) {
          return;
        }
        ui.jobLogs.textContent += (ui.jobLogs.textContent ? "\n" : "") + lines.join("\n");
        ui.jobLogs.scrollTop = ui.jobLogs.scrollHeight;
      }

      function triggerDownload(url, filename = "") {
        if (!url) {
          return;
        }
        const link = document.createElement("a");
        link.href = url;
        link.rel = "noreferrer";
        if (filename) {
          link.download = filename;
        } else {
          link.download = "";
        }
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      async function sendOptionToTelegram(optionId) {
        if (!state.jobId) {
          throw new Error("No hay job activo para compartir.");
        }
        return api("/api/share/telegram", { job_id: state.jobId, option_id: optionId }, 180000);
      }

      function renderResults(result) {
        state.lastResult = result || null;
        const options = result?.options || [];
        ui.resultMeta.textContent = `${result?.source_title || "Video"} | ${options.length} opciones`;
        ui.results.innerHTML = "";
        options.forEach((opt) => {
          const card = document.createElement("article");
          card.className = "clip";
          const previewUrl = resolveAssetUrl(opt.preview_url);
          const posterUrl = resolveAssetUrl(opt.poster_url);
          const manualUrl = resolveAssetUrl(opt.manual_upload_url);
          const preview = previewUrl
            ? `<video controls playsinline preload="metadata" ${posterUrl ? `poster="${escapeHtml(posterUrl)}"` : ""} src="${escapeHtml(previewUrl)}"></video>`
            : "";
          const tags = Array.isArray(opt.signal_tags)
            ? opt.signal_tags.map((tag) => `<span class="signal">${escapeHtml(tag)}</span>`).join("")
            : "";
          const transcript = opt.transcript_preview
            ? `<div class="transcript">${escapeHtml(opt.transcript_preview)}</div>`
            : "";
          card.innerHTML = `
            ${preview}
            <div class="body">
              <div class="pill">Option ${opt.option_id}</div>
              <div class="pill">Score ${Number(opt.score).toFixed(1)}</div>
              <div class="pill">Interest ${Number(opt.interest_score).toFixed(1)}</div>
              <div class="pill">Reach ${Number(opt.reach_score).toFixed(1)}</div>
              ${tags ? `<div class="signal-row">${tags}</div>` : ""}
              <div class="desc">${escapeHtml(opt.short_description || "")}</div>
              <div class="why">${escapeHtml(opt.why_it_may_work || "")}</div>
              ${transcript}
              <div class="metrics">
                <span class="metric">Audio ${Number(opt.audio_score || 0).toFixed(1)}</span>
                <span class="metric">Visual ${Number(opt.visual_score || 0).toFixed(1)}</span>
                <span class="metric">Cues ${Number(opt.cue_count || 0)}</span>
                <span class="metric">Escenas ${Number(opt.scene_cut_count || 0)}</span>
              </div>
              <div class="links">
                ${previewUrl ? `<a href="${escapeHtml(previewUrl)}" target="_blank" rel="noreferrer">Preview</a>` : ""}
                ${manualUrl ? `<button type="button" class="secondary js-send-telegram">Descargar + Telegram</button>` : ""}
              </div>
            </div>
          `;
          if (manualUrl) {
            const sendBtn = card.querySelector(".js-send-telegram");
            if (sendBtn) {
              sendBtn.addEventListener("click", async () => {
                sendBtn.disabled = true;
                triggerDownload(manualUrl, opt.preview_file || `option_${opt.option_id}.mp4`);
                setStatus(ui.jobStatus, `Enviando opcion ${opt.option_id} a Telegram...`, false);
                try {
                  await sendOptionToTelegram(opt.option_id);
                  setStatus(ui.jobStatus, `Opcion ${opt.option_id} descargada y enviada a Telegram.`, false);
                } catch (err) {
                  setStatus(ui.jobStatus, `La descarga salio, pero Telegram fallo: ${err.message}`, true);
                } finally {
                  sendBtn.disabled = false;
                }
              });
            }
          }
          ui.results.appendChild(card);
        });
      }

      async function pollJob() {
        if (!state.jobId) {
          return;
        }
        if (state.pollInFlight) {
          return;
        }
        state.pollInFlight = true;
        try {
          const data = await api(`/api/jobs/${state.jobId}?since_log=${state.logCursor}`, undefined, 30000);
          state.pollFailures = 0;
          state.logCursor = Number(data.next_log_cursor || state.logCursor);
          appendLogs(data.logs || []);
          setStatus(ui.jobStatus, `Estado job: ${data.status}`, data.status === "failed");
          if (data.status === "completed") {
            clearPolling();
            renderResults(data.result);
          } else if (data.status === "failed") {
            clearPolling();
          }
        } catch (err) {
          state.pollFailures += 1;
          if (state.pollFailures >= state.pollFailureLimit) {
            clearPolling();
            setStatus(
              ui.jobStatus,
              `Error polling persistente (${state.pollFailures}/${state.pollFailureLimit}): ${err.message}`,
              true
            );
          } else {
            setStatus(
              ui.jobStatus,
              `Corte temporal (${state.pollFailures}/${state.pollFailureLimit}), reintentando...`,
              false
            );
          }
        } finally {
          state.pollInFlight = false;
        }
      }

      async function createJob() {
        const url = ui.urlInput.value.trim();
        if (!url || (!url.includes("youtube.com") && !url.includes("youtu.be"))) {
          setStatus(ui.jobStatus, "Pega una URL válida de YouTube.", true);
          return;
        }
        try {
          ui.jobLogs.textContent = "";
          ui.results.innerHTML = "";
          ui.resultMeta.textContent = "Procesando...";
          const payload = {
            url,
            duration: readNumberInput("durationInput", 60),
            options: readNumberInput("optionsInput", 6),
            stride: readNumberInput("strideInput", 10),
            overlap_ratio: readNumberInput("overlapInput", 0.4)
          };
          const data = await api("/api/jobs", payload);
          state.jobId = data.job_id;
          state.logCursor = 0;
          state.pollFailures = 0;
          setStatus(ui.jobStatus, `Job creado: ${state.jobId}`, false);
          clearPolling();
          state.pollTimer = setInterval(pollJob, 3000);
          await pollJob();
        } catch (err) {
          setStatus(ui.jobStatus, `Error creando job: ${err.message}`, true);
        }
      }

      async function checkHealth() {
        try {
          const data = await api("/api/health");
          const ytMode = data.youtube_api_configured ? "YouTube API ES activa" : "fallback scrape";
          const tgMode = data.telegram_configured ? "Telegram listo" : "Telegram no configurado";
          setStatus(ui.healthStatus, `OK: ${data.service} | ${ytMode} | ${tgMode}`, false);
        } catch (err) {
          setStatus(ui.healthStatus, `Error backend: ${err.message}`, true);
        }
      }

      $("saveBackendBtn").onclick = saveBackendUrl;
      $("healthBtn").onclick = checkHealth;
      $("discoverBtn").onclick = discover;
      $("generateBtn").onclick = createJob;

      (function init() {
        state.backend = chooseInitialBackend();
        ui.backendUrl.value = state.backend;
        if (state.backend) {
          setStatus(ui.healthStatus, `Backend cargado: ${state.backend}`, false);
          checkHealth().catch(() => {});
        }
      })();
    </script>
  </body>
</html>
